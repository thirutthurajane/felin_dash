name: feline_dash
description: "Feline Dash — Flutter Flame endless runner featuring a cat protagonist."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ── Game engine ────────────────────────────────────────────────────────────
  flame: ^1.18.0
  flame_audio: ^2.1.0

  # ── State management (outside game world) ──────────────────────────────────
  flutter_riverpod: ^2.5.0

  # ── Local persistence ──────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flame_test: ^1.18.0
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    # Audio
    - assets/audio/bgm/
    - assets/audio/sfx/
    # Sprites
    - assets/images/characters/
    - assets/images/obstacles/
    - assets/images/collectibles/
    - assets/images/environment/
    - assets/images/ui/
    # Tiled maps
    - assets/maps/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
